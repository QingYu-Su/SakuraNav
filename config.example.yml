# SakuraNav 配置文件示例
# 复制此文件为 config.yml 并修改配置

# 服务器配置
server:
  # 服务端口（默认 8080）
  port: 8080
  
  # 会话签名密钥（可选，未指定时自动生成到 .secret 文件，不会修改本文件）
  # ⚠️ 修改此值会使所有已登录用户的会话失效
  # ⚠️ 也支持通过环境变量 SESSION_SECRET 指定（优先级更高）
  # secret: your-random-secret-key

# 数据库配置
database:
  # 数据库类型: sqlite（默认） | mysql | postgresql
  type: sqlite

  # MySQL 配置（type 为 mysql 时需填写）
  # mysql:
  #   host: localhost
  #   port: 3306
  #   database: sakuranav
  #   user: root
  #   password: ""

  # PostgreSQL 配置（type 为 postgresql 时需填写）
  # postgresql:
  #   host: localhost
  #   port: 5432
  #   database: sakuranav
  #   user: postgres
  #   password: ""
