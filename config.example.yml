# SakuraNav 配置文件示例
# 复制此文件为 config.yml 并修改配置

# 服务器配置
server:
  # 服务端口（默认 8080）
  port: 8080

# 管理员账号配置
admin:
  # 管理员用户名（默认 admin）
  username: "admin"
  # 管理员密码（默认 sakura，建议修改为强密码）
  password: "sakura"
  # 登录入口路径（默认 login，访问路径为 /login）
  path: "login"

# AI 分析配置（可选，不配置则不影响构建，但 AI 分析功能不可用）
# 支持所有 OpenAI-compatible 提供商（OpenAI、DeepSeek、Moonshot、GLM 等）
model:
  apiKey: "sk-xxxxxxxxxxxxxxxx"
  baseUrl: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
