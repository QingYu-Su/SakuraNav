# SakuraNav Docker Compose 模板
# 保存为 docker-compose.yml 后直接运行即可

services:
  sakuranav:
    image: sqingyu/sakuranav:latest
    container_name: sakuranav
    restart: unless-stopped
    ports:
      - "8080:8080"  # 可修改左侧端口，如 "9000:8080"
    volumes:
      # 数据目录：存储数据库、配置文件和上传文件
      # 首次运行会自动创建，无需手动准备
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai

# 使用说明：
# 1. 保存此文件为 docker-compose.yml
# 2. 运行：docker compose up -d（或 docker-compose up -d）
# 3. 访问：http://localhost:8080
# 4. 修改配置：编辑 ./data/config.yml 设置管理员密码
# 5. 重启容器：docker compose restart
